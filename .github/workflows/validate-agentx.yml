name: Validate agentX

on:
  push:
  pull_request:

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/agentx/package-lock.json
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Install
        working-directory: packages/agentx
        run: npm ci
      - name: Typecheck
        working-directory: packages/agentx
        run: npm run typecheck
      - name: Test
        working-directory: packages/agentx
        run: npm test
      - name: Build
        working-directory: packages/agentx
        run: npm run build
      - name: Syntax check TUI plugin
        working-directory: packages/agentx
        run: node --check dist/tui-sidebar.js
      - name: Syntax check shell installers
        if: runner.os != 'Windows'
        run: |
          bash -n scripts/install-posix.sh
          bash -n scripts/install-mac.sh
          bash -n scripts/install-linux.sh
          bash -n scripts/bootstrap-mac.sh
          bash -n scripts/bootstrap-linux.sh
          bash -n artifacts/scripts/bootstrap-mac.sh
          bash -n scripts/upgrade-mac.sh
          bash -n scripts/upgrade-linux.sh
          bash -n scripts/uninstall-posix.sh
          bash -n scripts/uninstall-mac.sh
          bash -n scripts/uninstall-linux.sh
      - name: Syntax check PowerShell installers
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content install.ps1 -Raw), [ref]$errors)
          if ($errors) { throw ($errors | Out-String) }
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content scripts/install-windows.ps1 -Raw), [ref]$errors)
          if ($errors) { throw ($errors | Out-String) }
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content scripts/bootstrap-windows.ps1 -Raw), [ref]$errors)
          if ($errors) { throw ($errors | Out-String) }
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content artifacts/scripts/bootstrap-windows.ps1 -Raw), [ref]$errors)
          if ($errors) { throw ($errors | Out-String) }
      - name: CLI smoke test (POSIX)
        if: runner.os != 'Windows'
        run: |
          mkdir -p "$RUNNER_TEMP/agentx-smoke"
          printf 'Smoke rules\n' > "$RUNNER_TEMP/agentx-smoke/GEMINI.md"
          node packages/agentx/dist/cli.js --project "$RUNNER_TEMP/agentx-smoke" init
          node packages/agentx/dist/cli.js --project "$RUNNER_TEMP/agentx-smoke" setup-ux --dry-run --no-install-opencode --no-plugins
          node packages/agentx/dist/cli.js --project "$RUNNER_TEMP/agentx-smoke" self-update --dry-run --no-setup --no-ux --no-install-opencode
          node packages/agentx/dist/cli.js --project "$RUNNER_TEMP/agentx-smoke" sync --rulesync off
          node packages/agentx/dist/cli.js --project "$RUNNER_TEMP/agentx-smoke" validate
          node packages/agentx/dist/cli.js --project "$RUNNER_TEMP/agentx-smoke" security-check
          node packages/agentx/dist/cli.js --project "$RUNNER_TEMP/agentx-smoke" bridge --no-refresh
      - name: CLI smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $project = Join-Path $env:RUNNER_TEMP "agentx-smoke"
          New-Item -ItemType Directory -Force -Path $project | Out-Null
          Set-Content -Path (Join-Path $project "GEMINI.md") -Value "Smoke rules"
          node packages/agentx/dist/cli.js --project $project init
          node packages/agentx/dist/cli.js --project $project setup-ux --dry-run --no-install-opencode --no-plugins
          node packages/agentx/dist/cli.js --project $project self-update --dry-run --no-setup --no-ux --no-install-opencode
          node packages/agentx/dist/cli.js --project $project sync --rulesync off
          node packages/agentx/dist/cli.js --project $project validate --windows
          node packages/agentx/dist/cli.js --project $project security-check
          node packages/agentx/dist/cli.js --project $project bridge --no-refresh
      - name: Home-mode check smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Join-Path $env:RUNNER_TEMP "agentx-home-bin"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          $repo = $PWD.Path
          Set-Content -Path (Join-Path $bin "gemini.cmd") -Value "@echo off`r`necho gemini-smoke`r`n"
          Set-Content -Path (Join-Path $bin "opencode.cmd") -Value "@echo off`r`nif ""%1""==""--version"" (`r`n  echo opencode-smoke`r`n  exit /b 0`r`n)`r`nif ""%1""==""debug"" (`r`n  echo {""agent"":{},""command"":{}}`r`n  exit /b 0`r`n)`r`necho opencode-smoke`r`n"
          Set-Content -Path (Join-Path $bin "agentx.cmd") -Value "@echo off`r`nnode ""$repo\packages\agentx\dist\cli.js"" %*`r`n"
          $env:Path = "$bin;$env:Path"
          New-Item -ItemType Directory -Force -Path (Join-Path $env:USERPROFILE ".gemini") | Out-Null
          Set-Content -Path (Join-Path $env:USERPROFILE ".gemini/GEMINI.md") -Value "Global smoke rules"
          node packages/agentx/dist/cli.js --project $env:USERPROFILE check --force --rulesync off --windows --plain
      - name: Validate schemas exist
        run: node -e "const fs=require('node:fs'); for (const p of ['packages/agentx/schemas/inventory.schema.json','packages/agentx/schemas/gemini-extension-compat.schema.json']) if (!fs.existsSync(p)) throw new Error(p + ' missing')"
